<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>졸음 깨우기 게임 🏫</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(160deg, #1a3320 0%, #243d2e 60%, #1a2e22 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: white;
      overflow: hidden;
    }

    /* ── HUD ─────────────────────────────────────────────── */
    #hud {
      display: flex;
      gap: 20px;
      align-items: center;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      padding: 10px 26px;
      border-radius: 30px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.55; margin-bottom: 1px; }
    .hud-val { font-size: 22px; font-weight: 700; line-height: 1; }
    #phase-badge {
      padding: 4px 12px; border-radius: 16px;
      font-size: 12px; font-weight: 800;
      background: #4CAF50; letter-spacing: 0.5px;
      transition: background 0.5s;
    }
    .hud-sep { width: 1px; height: 36px; background: rgba(255,255,255,0.1); }

    /* ── CLASSROOM ───────────────────────────────────────── */
    #classroom {
      background: #b89450;
      background-image:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 50px),
        repeating-linear-gradient(rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 50px);
      border: 5px solid #7a5510;
      border-radius: 14px;
      padding: 18px 22px 26px;
      width: min(740px, 100%);
      box-shadow: 0 10px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,220,100,0.2);
    }

    /* ── CHALKBOARD ──────────────────────────────────────── */
    #chalkboard {
      background: linear-gradient(180deg, #305a2a 0%, #2a5124 100%);
      border: 7px solid #6b4510;
      border-radius: 5px;
      height: 66px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.4), 0 3px 0 #4a3008;
    }
    #chalkboard-text {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
    }
    /* chalk tray */
    #chalkboard::after {
      content: '';
      position: absolute;
      bottom: -14px; left: 10px; right: 10px; height: 10px;
      background: #6b4510;
      border-radius: 0 0 3px 3px;
    }

    /* ── DESK ROWS ───────────────────────────────────────── */
    .desk-row {
      display: flex; justify-content: center; gap: 14px;
      margin-bottom: 14px;
    }
    .desk-row:last-child { margin-bottom: 0; }

    /* ── DESK ────────────────────────────────────────────── */
    .desk {
      background: linear-gradient(150deg, #e8c07a 0%, #d4a843 55%, #c49333 100%);
      border: 2px solid #8B6914;
      border-radius: 10px;
      padding: 9px 13px;
      display: flex;
      gap: 14px;
      box-shadow: 0 6px 0 #7a5510, 0 7px 12px rgba(0,0,0,0.3);
      position: relative;
    }
    /* desk legs */
    .desk::before, .desk::after {
      content: '';
      position: absolute;
      bottom: -14px; width: 8px; height: 14px;
      background: #7a5510; border-radius: 0 0 3px 3px;
    }
    .desk::before { left: 14px; }
    .desk::after { right: 14px; }

    /* ── STUDENT ─────────────────────────────────────────── */
    .student {
      display: flex; flex-direction: column; align-items: center;
      position: relative;
      width: 52px;
      cursor: default;
      user-select: none;
    }
    .student.sleeping { cursor: pointer; }
    .student.sleeping:hover .student-figure { filter: brightness(1.1); }

    .student-figure {
      position: relative;
      width: 44px; height: 62px;
      border-radius: 8px;
      transition: box-shadow 0.2s;
    }

    /* HEAD */
    .s-head {
      width: 30px; height: 30px;
      border-radius: 50%;
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 1px;
      z-index: 2;
    }
    /* Hair */
    .s-hair {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 30px; height: 14px;
      border-radius: 15px 15px 2px 2px;
      pointer-events: none;
    }
    /* Eyes */
    .s-eye-l, .s-eye-r {
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%; background: #222;
      top: 15px;
      transition: height 0.25s, border-radius 0.25s, top 0.25s;
    }
    .s-eye-l { left: 5px; }
    .s-eye-r { right: 5px; }
    /* Mouth */
    .s-mouth {
      position: absolute;
      bottom: 6px; left: 50%; transform: translateX(-50%);
      width: 10px; height: 5px;
      border-bottom: 2px solid rgba(0,0,0,0.4);
      border-radius: 0 0 5px 5px;
    }

    /* BODY */
    .s-body {
      width: 36px; height: 26px;
      border-radius: 8px 8px 5px 5px;
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 27px;
    }
    .s-arm-l, .s-arm-r {
      position: absolute;
      width: 9px; height: 13px;
      border-radius: 5px;
      bottom: 2px;
    }
    .s-arm-l { left: 1px; }
    .s-arm-r { right: 1px; }

    /* ── SLEEPING STATE ──────────────────────────────────── */
    .student.sleeping .s-head {
      animation: nod 2.2s ease-in-out infinite;
    }
    @keyframes nod {
      0%, 100% { transform: translateX(-50%) rotate(16deg) translateY(2px); }
      50%       { transform: translateX(-50%) rotate(26deg) translateY(5px); }
    }

    .student.sleeping .s-eye-l,
    .student.sleeping .s-eye-r {
      height: 2px; border-radius: 1px; top: 16px;
    }

    /* ZZZ */
    .zzz-wrap {
      position: absolute;
      top: -4px; right: -10px;
      pointer-events: none;
      display: none;
    }
    .student.sleeping .zzz-wrap { display: block; }

    .zzz-letter {
      position: absolute;
      color: #c0b8ff;
      font-weight: 900;
      opacity: 0;
      text-shadow: 0 0 6px #7060ff;
    }
    .zzz-letter:nth-child(1) { font-size:  9px; left:  0px; top: 14px; animation: floatZ 2.2s ease-in-out infinite 0s;    }
    .zzz-letter:nth-child(2) { font-size: 12px; left:  5px; top:  5px; animation: floatZ 2.2s ease-in-out infinite 0.7s;  }
    .zzz-letter:nth-child(3) { font-size: 16px; left: 13px; top: -4px; animation: floatZ 2.2s ease-in-out infinite 1.4s;  }

    @keyframes floatZ {
      0%   { opacity: 0; transform: translate(0,  6px) rotate(-5deg); }
      20%  { opacity: 1; }
      80%  { opacity: 0.5; }
      100% { opacity: 0; transform: translate(5px,-14px) rotate(8deg); }
    }

    /* Sleep countdown bar */
    .sleep-bar-wrap {
      position: absolute;
      bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 50px; height: 5px;
      background: rgba(0,0,0,0.25);
      border-radius: 3px; overflow: hidden;
      display: none;
    }
    .student.sleeping .sleep-bar-wrap { display: block; }
    .sleep-bar {
      height: 100%; width: 100%;
      background: #4CAF50; border-radius: 3px;
      transition: background 0.15s;
    }

    /* Student name */
    .student-name {
      font-size: 10px; color: #5a3009; font-weight: 700;
      margin-top: 10px; white-space: nowrap;
    }

    /* ── ANIMATIONS ──────────────────────────────────────── */
    @keyframes wakeAnim {
      0%   { transform: scale(1)    rotate(0deg);  }
      25%  { transform: scale(1.28) rotate(-8deg); }
      60%  { transform: scale(1.12) rotate(4deg);  }
      100% { transform: scale(1)    rotate(0deg);  }
    }
    .student.waking .student-figure { animation: wakeAnim 0.38s ease; }

    @keyframes failAnim {
      0%, 100% { filter: none; }
      20%, 60%  { filter: brightness(2.5) saturate(0); }
      40%       { filter: sepia(1) hue-rotate(-40deg) saturate(4) brightness(1.6); }
    }
    .student.fail-anim .student-figure { animation: failAnim 0.5s ease; }

    /* Score popup */
    .score-pop {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      color: #FFD700; font-size: 16px; font-weight: 900;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      pointer-events: none;
      animation: scorePop 0.75s ease forwards;
      z-index: 20;
    }
    @keyframes scorePop {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-32px); }
    }

    /* ── OVERLAYS ────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(3px);
    }
    .overlay-card {
      background: linear-gradient(145deg, #1e3d28 0%, #2d4a2d 100%);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 40px 48px;
      text-align: center;
      width: min(420px, 92vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.65);
    }
    .overlay-icon { font-size: 62px; margin-bottom: 10px; }
    .overlay-title { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .overlay-desc { font-size: 14px; opacity: 0.7; line-height: 1.7; margin-bottom: 6px; }
    .overlay-score { font-size: 50px; font-weight: 900; color: #FFD700; margin-bottom: 22px; line-height: 1; }
    .overlay-meta { font-size: 13px; opacity: 0.55; margin-bottom: 24px; }

    .rules-list {
      text-align: left; margin: 12px auto 22px;
      max-width: 270px; font-size: 13px; opacity: 0.8; line-height: 2;
      list-style: none;
    }
    .rules-list li::before { content: '▸ '; color: #4CAF50; }

    .btn {
      padding: 13px 38px;
      font-size: 17px; font-weight: 700;
      border: none; border-radius: 14px;
      cursor: pointer; background: #4CAF50; color: white;
      letter-spacing: 0.3px;
      box-shadow: 0 5px 0 #2d7a30;
      transition: all 0.12s;
    }
    .btn:hover  { background: #45a049; transform: translateY(-1px); box-shadow: 0 6px 0 #2d7a30; }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2d7a30; }

    /* phase transition flash */
    @keyframes phaseFlash {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .phase-flash { animation: phaseFlash 0.4s ease 2; }
  </style>
</head>
<body>

<!-- Start Screen -->
<div class="overlay" id="start-screen">
  <div class="overlay-card">
    <div class="overlay-icon">🏫</div>
    <div class="overlay-title">졸음 깨우기 게임</div>
    <div class="overlay-desc">교실에서 조는 학생들을 클릭해서 깨워주세요!</div>
    <ul class="rules-list">
      <li>조는 학생은 <strong>3초 안에</strong> 클릭해야 해요</li>
      <li>3번 놓치면 게임 종료 ❤️❤️❤️</li>
      <li>시간이 지날수록 더 많이 졸아요!</li>
    </ul>
    <button class="btn" onclick="startGame()">게임 시작! 🎮</button>
  </div>
</div>

<!-- Game Over Screen -->
<div class="overlay" id="gameover-screen" style="display:none">
  <div class="overlay-card">
    <div class="overlay-icon" id="go-icon">😵</div>
    <div class="overlay-title" id="go-title">게임 종료!</div>
    <div class="overlay-score" id="go-score"></div>
    <div class="overlay-meta" id="go-meta"></div>
    <button class="btn" onclick="resetGame()">다시 하기 🔄</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">
    <div class="hud-label">목숨</div>
    <div class="hud-val" id="hud-lives">❤️❤️❤️</div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-item">
    <div class="hud-label">점수</div>
    <div class="hud-val" id="hud-score">0</div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-item">
    <div class="hud-label">시간</div>
    <div class="hud-val" id="hud-time">0:00</div>
  </div>
  <div class="hud-sep"></div>
  <div id="phase-badge">준비</div>
</div>

<!-- Classroom -->
<div id="classroom">
  <div id="chalkboard">
    <span id="chalkboard-text">📚 오늘의 수업: Claude Code 바이브코딩 🖊</span>
  </div>
  <div class="desk-row" id="row1"></div>
  <div class="desk-row" id="row2"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════

const SLEEP_MS = 3000;

// Phase definitions: [minTime, maxConcurrent, spawnInterval(ms)]
const PHASES = [
  null,
  { label: '1단계', color: '#4CAF50', maxC: 1, interval: () => 2200 + Math.random() * 1400 },
  { label: '2단계', color: '#FF9800', maxC: 2, interval: () => 1000 },
  { label: '🔥 3단계', color: '#F44336', maxC: 4, interval: () => 1000 },
];

const COLORS = [
  { skin: '#FDBCB4', shirt: '#E74C3C', hair: '#3D2B1F' },
  { skin: '#FDBCB4', shirt: '#3498DB', hair: '#1a1a1a' },
  { skin: '#D4A76A', shirt: '#9B59B6', hair: '#111' },
  { skin: '#FDBCB4', shirt: '#E67E22', hair: '#7a3b10' },
  { skin: '#D4A76A', shirt: '#1ABC9C', hair: '#111' },
  { skin: '#FDBCB4', shirt: '#27AE60', hair: '#5a3000' },
  { skin: '#C8895A', shirt: '#E74C3C', hair: '#1a1a1a' },
  { skin: '#FDBCB4', shirt: '#F39C12', hair: '#c8a000' },
  { skin: '#D4A76A', shirt: '#EC407A', hair: '#1a1a1a' },
  { skin: '#FDBCB4', shirt: '#00ACC1', hair: '#2a2a2a' },
];

const NAMES = ['민준','서연','예준','지아','도윤','하은','시우','소율','주원','나은'];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════

let G = {
  active: false,
  score: 0,
  failures: 0,
  gameTime: 0,
  lastPhase: 0,
  students: [],       // { id, state, sleepStart, failTimer, barTimer }
  clockId: null,
  spawnId: null,
};

// ═══════════════════════════════════════════════════════════
//  BUILD DOM
// ═══════════════════════════════════════════════════════════

function buildClassroom() {
  const row1 = document.getElementById('row1');
  const row2 = document.getElementById('row2');
  row1.innerHTML = '';
  row2.innerHTML = '';
  G.students = [];

  for (let d = 0; d < 5; d++) {
    const deskEl = document.createElement('div');
    deskEl.className = 'desk';

    for (let s = 0; s < 2; s++) {
      const idx = d * 2 + s;
      const c = COLORS[idx];

      const el = document.createElement('div');
      el.className = 'student';
      el.id = `st-${idx}`;
      el.innerHTML = `
        <div class="student-figure" id="fig-${idx}">
          <div class="s-head" style="background:${c.skin}">
            <div class="s-hair" style="background:${c.hair}"></div>
            <div class="s-eye-l"></div>
            <div class="s-eye-r"></div>
            <div class="s-mouth"></div>
          </div>
          <div class="s-body" style="background:${c.shirt}">
            <div class="s-arm-l" style="background:${c.shirt}"></div>
            <div class="s-arm-r" style="background:${c.shirt}"></div>
          </div>
          <div class="zzz-wrap">
            <span class="zzz-letter">z</span>
            <span class="zzz-letter">z</span>
            <span class="zzz-letter">Z</span>
          </div>
          <div class="sleep-bar-wrap">
            <div class="sleep-bar" id="bar-${idx}"></div>
          </div>
        </div>
        <div class="student-name">${NAMES[idx]}</div>
      `;
      el.addEventListener('click', () => onClickStudent(idx));
      deskEl.appendChild(el);

      G.students.push({ id: idx, state: 'awake', sleepStart: null, failTimer: null, barTimer: null });
    }

    (d < 3 ? row1 : row2).appendChild(deskEl);
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  buildClassroom();

  Object.assign(G, { active: true, score: 0, failures: 0, gameTime: 0, lastPhase: 1 });
  renderHUD();

  G.clockId = setInterval(() => {
    G.gameTime++;
    const newPhase = getPhase();
    if (newPhase !== G.lastPhase) {
      G.lastPhase = newPhase;
      flashPhase();
    }
    renderHUD();
  }, 1000);

  scheduleSpawn();
}

function resetGame() {
  stopAll();
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

function stopAll() {
  G.active = false;
  clearInterval(G.clockId);
  clearTimeout(G.spawnId);
  G.students.forEach(s => { clearTimeout(s.failTimer); clearInterval(s.barTimer); });
}

function endGame() {
  stopAll();
  const icon = G.score >= 20 ? '🏆' : G.score >= 10 ? '😅' : '😵';
  document.getElementById('go-icon').textContent = icon;
  document.getElementById('go-score').textContent = `${G.score}점`;
  document.getElementById('go-meta').textContent = `생존 시간: ${fmtTime(G.gameTime)}  |  실패: ${G.failures}번`;
  document.getElementById('gameover-screen').style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════
//  PHASE & SPAWN
// ═══════════════════════════════════════════════════════════

function getPhase() {
  if (G.gameTime < 5)  return 1;
  if (G.gameTime < 10) return 2;
  return 3;
}

function flashPhase() {
  const badge = document.getElementById('phase-badge');
  badge.classList.remove('phase-flash');
  void badge.offsetWidth; // reflow
  badge.classList.add('phase-flash');
}

function scheduleSpawn() {
  if (!G.active) return;
  const interval = PHASES[getPhase()].interval();
  G.spawnId = setTimeout(() => {
    if (!G.active) return;
    trySpawn();
    scheduleSpawn();
  }, interval);
}

function trySpawn() {
  const maxC = PHASES[getPhase()].maxC;
  const sleeping = G.students.filter(s => s.state === 'sleeping').length;
  if (sleeping >= maxC) return;

  const awake = G.students.filter(s => s.state === 'awake');
  if (!awake.length) return;

  const target = awake[Math.floor(Math.random() * awake.length)];
  makeSleep(target.id);
}

// ═══════════════════════════════════════════════════════════
//  STUDENT ACTIONS
// ═══════════════════════════════════════════════════════════

function makeSleep(idx) {
  const s = G.students[idx];
  if (s.state !== 'awake') return;

  s.state = 'sleeping';
  s.sleepStart = Date.now();

  const stEl = document.getElementById(`st-${idx}`);
  const figEl = document.getElementById(`fig-${idx}`);
  const barEl = document.getElementById(`bar-${idx}`);

  stEl.classList.add('sleeping');
  figEl.style.boxShadow = '0 0 14px 5px #4CAF50';
  barEl.style.width = '100%';
  barEl.style.background = '#4CAF50';

  s.barTimer = setInterval(() => {
    const pct = Math.max(0, 1 - (Date.now() - s.sleepStart) / SLEEP_MS);
    barEl.style.width = (pct * 100) + '%';
    if (pct > 0.5) {
      barEl.style.background = '#4CAF50';
      figEl.style.boxShadow = '0 0 14px 5px #4CAF50';
    } else if (pct > 0.25) {
      barEl.style.background = '#FF9800';
      figEl.style.boxShadow = '0 0 16px 6px #FF9800';
    } else {
      barEl.style.background = '#F44336';
      figEl.style.boxShadow = '0 0 18px 7px #F44336';
    }
  }, 50);

  s.failTimer = setTimeout(() => failStudent(idx), SLEEP_MS);
}

function onClickStudent(idx) {
  if (!G.active) return;
  const s = G.students[idx];
  if (s.state !== 'sleeping') return;

  clearTimeout(s.failTimer);
  clearInterval(s.barTimer);
  s.state = 'awake';
  G.score++;

  const stEl = document.getElementById(`st-${idx}`);
  const figEl = document.getElementById(`fig-${idx}`);
  stEl.classList.remove('sleeping');
  stEl.classList.add('waking');
  figEl.style.boxShadow = '';

  // +1 popup
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+1';
  stEl.appendChild(pop);
  setTimeout(() => pop.remove(), 780);

  setTimeout(() => stEl.classList.remove('waking'), 420);
  renderHUD();
}

function failStudent(idx) {
  const s = G.students[idx];
  if (s.state !== 'sleeping') return;

  clearInterval(s.barTimer);
  s.state = 'awake';
  G.failures++;

  const stEl = document.getElementById(`st-${idx}`);
  const figEl = document.getElementById(`fig-${idx}`);
  stEl.classList.remove('sleeping');
  stEl.classList.add('fail-anim');
  figEl.style.boxShadow = '';
  setTimeout(() => stEl.classList.remove('fail-anim'), 560);

  renderHUD();
  if (G.failures >= 3) setTimeout(endGame, 700);
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════

function renderHUD() {
  const hp = 3 - G.failures;
  document.getElementById('hud-lives').textContent = '❤️'.repeat(hp) + '🖤'.repeat(G.failures);
  document.getElementById('hud-score').textContent = G.score;
  document.getElementById('hud-time').textContent = fmtTime(G.gameTime);

  const phase = G.active ? getPhase() : 0;
  const badge = document.getElementById('phase-badge');
  if (phase > 0) {
    badge.textContent = PHASES[phase].label;
    badge.style.background = PHASES[phase].color;
  } else {
    badge.textContent = '준비';
    badge.style.background = '#888';
  }
}

function fmtTime(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// Init
buildClassroom();
renderHUD();
</script>
</body>
</html>
