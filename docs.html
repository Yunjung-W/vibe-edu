<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding Prompts</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #000000;
    --bg-secondary: #0A0A0A;
    --bg-card: #111111;
    --bg-code: #000000;
    --border: #333333;
    --border-active: #FFFFFF;
    --text-primary: #FFFFFF;
    --text-secondary: #CCCCCC;
    --text-muted: #888888;
    --accent-blue: #FFFFFF;
    --accent-green: #FFFFFF;
    --accent-orange: #FFFFFF;
    --accent-purple: #FFFFFF;
    --accent-pink: #FFFFFF;
    --accent-cyan: #FFFFFF;
    --copy-btn: #1A1A1A;
    --copy-btn-hover: #3F568B;
    --copy-success: #3F568B;
    --tag-kr: #FFFFFF;
    --tag-en: #FFFFFF;
    --terminal-green: #FFFFFF;
    --terminal-prompt: #CCCCCC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 64px 24px 40px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(63,185,80,0.015) 2px,
      rgba(63,185,80,0.015) 4px
    );
    pointer-events: none;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    background: rgba(63,185,80,0.08);
    border: 1px solid rgba(63,185,80,0.25);
    border-radius: 3px;
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--terminal-green);
    font-weight: 500;
    margin-bottom: 28px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .hero-badge::before {
    content: '$ ';
    color: var(--terminal-prompt);
    opacity: 0.8;
  }

  .hero h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    color: var(--terminal-green);
    text-shadow: 0 0 24px rgba(63,185,80,0.35);
    position: relative;
  }

  .hero h1::before {
    content: '# ';
    color: var(--terminal-prompt);
    font-weight: 400;
  }

  .hero p {
    font-size: 18px;
    color: var(--text-secondary);
    max-width: 600px;
    margin: 0 auto;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .hero p::before {
    content: '// ';
    color: var(--text-muted);
  }

  /* ── CONTAINER ── */
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── CARD ── */
  .prompt-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 0;
    border-left: 3px solid var(--border);
    margin-bottom: 28px;
    overflow: hidden;
    transition: border-left-color 0.2s ease, box-shadow 0.2s ease;
  }

  .prompt-card:hover {
    border-left-color: var(--terminal-green);
    box-shadow: 0 0 0 1px rgba(63,185,80,0.08), 0 4px 24px rgba(0,0,0,0.4);
  }

  /* ── CARD HEADER ── */
  .card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--terminal-green) 0%, transparent 60%);
    opacity: 0.4;
  }

  .card-number {
    min-width: 44px;
    height: 28px;
    padding: 0 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 17px;
    line-height: 1;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .card-number.n1   { background: rgba(88,166,255); color: var(--accent-blue);   border: 1px solid rgba(88,166,255,0.2); }
  .card-number.n2   { background: rgba(63,185,80);  color: var(--accent-green);  border: 1px solid rgba(63,185,80,0.2); }
  .card-number.n3   { background: rgba(240,136,62); color: var(--accent-orange); border: 1px solid rgba(240,136,62,0.2); }

  .card-title-area {
    flex: 1;
  }

  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .card-title::before {
    content: '';
  }

  .card-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .card-subtitle::before {
    content: '  ';
  }

  /* ── PROMPT SECTION ── */
  .prompt-section {
    padding: 20px 24px;
  }

  .prompt-section + .prompt-section {
    border-top: 1px solid var(--border);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .lang-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .lang-tag.kr {
    background: rgba(88,166,255,0.1);
    color: var(--tag-kr);
    border: 1px solid rgba(88,166,255,0.2);
  }

  .lang-tag.en {
    background: rgba(240,136,62,0.1);
    color: var(--tag-en);
    border: 1px solid rgba(240,136,62,0.2);
  }

  /* ── COPY BUTTON ── */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--copy-btn);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-secondary);
    font-size: 17px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    letter-spacing: 0.02em;
  }

  .copy-btn:hover {
    background: var(--copy-btn-hover);
  }

  .copy-btn.copied {
    background: var(--copy-btn-hover);
  }

  .copy-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  /* ── PROMPT TEXT ── */
  .prompt-text {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 0;
    border-left: 2px solid rgba(63,185,80,0.2);
    padding: 18px 22px;
    font-size: 17px;
    line-height: 1.85;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: 'JetBrains Mono', monospace;
    max-height: 420px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .prompt-text::-webkit-scrollbar { width: 6px; }
  .prompt-text::-webkit-scrollbar-track { background: transparent; }
  .prompt-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 28px 24px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.04em;
  }

  .footer::before {
    content: '// ';
    color: rgba(77,89,102,0.6);
  }

  @media (max-width: 640px) {
    .hero { padding: 48px 20px 28px; }
    .container { padding: 0 16px 60px; }
    .card-header { padding: 14px 16px; gap: 12px; }
    .card-title { font-size: 19px; }
    .prompt-section { padding: 16px; }
    .prompt-text { font-size: 16px; }
    .section-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  }
</style>
</head>

<script>
const prompts = [
  {

    numTitle: "실습 1",

    subtitle: "Classroom Dozing Game",
    kr: `게임을 만들려고해. 규칙은 교실에 책상이 5개 놓여 있고 책상마다 두 명의 학생이 앉아서 수업을 듣고 있어. 학생들이 수업을 듣다가 졸기 시작하면 마우스로 클릭해서 조는 학생을 깨워야해. 학생이 졸기 시작한 후 2초가 지날 때까지 깨우지 못하면 실패이고, 총 세번 실패하면 게임이 끝나. 학생들이 조는 순서는 랜덤으로 처음 3초간은 전체 10명의 학생 중 한 명씩만 졸고, 이후에는 1초 간격으로 두 명씩 졸고, 10초가 지나면 1초 간격으로 최대 4명까지 졸아. "1st-project" 폴더를 만들고 게임이 동작하는 html을 저장해줘`,
    en: `I want to make a game. The rules are: there are 5 desks in a classroom, and two students are sitting at each desk listening to a lesson. As students start to doze off during class, you have to click on them with the mouse to wake them up. If you fail to wake a student within 2 seconds of them starting to doze, it counts as a failure, and if you fail 3 times in total, the game is over. The order in which students doze off is random — for the first 3 seconds, only one out of the 10 students dozes at a time; after that, two students doze every 1 second; and after 10 seconds have passed, up to 4 students doze every 1 second. Create a folder called "1st-project" and save a working game HTML file in it.`
  },
  {
    num: "2",
    numTitle: "실습 2",
    title: "국제 정세 보고서",
    subtitle: "Global Situation Report",
    kr: `아래 세 개의 웹사이트에 직접 접속해서 데이터를 가져와줘. 만약 인터넷 연결 문제가 생기면 data 폴더에 있는 파일을 대신 사용해줘.

데이터 소스:

현재 진행 중인 분쟁 목록 — https://en.wikipedia.org/wiki/List_of_ongoing_armed_conflicts

가져온 데이터는 각각 별도의 파일로 data 폴더에 저장해두고, 그 데이터를 이용해서 2nd-project 폴더를 만들고 그 밑에 index.html 보고서를 만들어줘.
보고서 조건:
기본 디자인

배경은 어두운 색, 전문적인 뉴스 느낌으로 만들어줘
맨 위에 "글로벌 정세 리포트 2026" 제목과 오늘 날짜를 크게 보여줘

섹션 1 — 진행 중인 분쟁 현황

숫자 요약 카드 3개: 전체 분쟁 건수, 대규모 분쟁 수, 소규모 분쟁 수

군사비 지출 상위 10개 국가를 가로 막대 그래프로 보여줘
한국이 목록에 있으면 한국 막대만 다른 색으로 강조해줘

섹션 3 — 글로벌 평화 지수 (아시아)

평화 지수 순위에서 아시아 국가들만 따로 뽑아서 표로 보여줘
점수가 낮을수록(더 평화로울수록) 초록색, 높을수록 빨간색으로 표시해줘

푸터

화면 하단에 세 개의 데이터 출처 사이트 주소를 모두 표시해줘`,
    en: `Access the three websites below directly and retrieve the data. If there are any internet connection issues, use the files in the data folder instead.

Data sources:

List of ongoing armed conflicts — https://en.wikipedia.org/wiki/List_of_ongoing_armed_conflicts

Save the retrieved data to separate files in the data folder, then create a folder called "2nd-project" and build an index.html report inside it using that data.

Report requirements:
Basic Design

3 summary stat cards: total number of conflicts, number of major conflicts, number of minor conflicts

If South Korea appears, highlight its bar in a different color

Extract only Asian countries from the peace index and show them in a table

Footer

  },
  {
    num: "3",
    numTitle: "실습 3",
    title: "글로벌 자동차 산업 대시보드",
    subtitle: "Global Auto Industry Dashboard (React + TypeScript + Node.js)",
    kr: `글로벌 자동차 산업 인사이트 대시보드 웹앱을 만들어줘.

# 프로젝트 개요
자동차 산업에 영향을 주는 국제 정세 변화와 세계 5대 자동차 그룹의 지역별 판매량 변화를 하나의 화면에서 볼 수 있는 인터랙티브 대시보드야. 프론트엔드와 백엔드를 함께 구성해서 "3rd-project" 폴더에 저장해줘.

\`\`\`
3rd-project/
├── frontend/   # React + TypeScript + Vite
└── backend/    # Node.js + Express + TypeScript
\`\`\`

# 기술 스택

## 프론트엔드 (frontend/)
- React + TypeScript + Vite
- 차트 라이브러리: Recharts
- 스타일링: Tailwind CSS
- 아이콘: Lucide React
- API 통신: Axios
- 데이터 캐싱/리페칭: TanStack Query (React Query)

## 백엔드 (backend/)
- Node.js + Express + TypeScript
- 스케줄러: \`node-cron\` (1시간 단위 데이터 수집)
- HTTP 클라이언트: Axios
- HTML 파싱: Cheerio (위키피디아/뉴스 페이지 스크래핑용)
- 데이터 저장: 로컬 JSON 파일 (\`backend/data/\` 폴더, 추후 DB 교체 가능한 구조로 추상화)
- 로깅: Winston 또는 Pino
- CORS 활성화 (프론트엔드 도메인 허용)
- 환경 변수: dotenv (\`.env\` 파일에 API 키 등 관리)

# 백엔드 상세 설계

## 1) 데이터 수집 스케줄러
\`node-cron\`을 사용해서 1시간 단위로 자동 데이터 수집을 수행해줘.

\`\`\`
0 * * * *  → 매시 정각에 실행
\`\`\`

서버 시작 시 1회 즉시 실행 후, 이후 1시간마다 반복.

## 2) 수집 대상 데이터 소스

### A. 판매량 데이터 (\`/api/sales\`)
다음 소스에서 5개 자동차 그룹의 분기별/연간 판매량을 수집:
- 위키피디아: \`https://en.wikipedia.org/wiki/List_of_manufacturers_by_motor_vehicle_production\`
- 각 그룹의 IR 페이지(가능하면): Toyota Global Newsroom, VW Group, Hyundai Motor Group, GM Investor, Stellantis
- 외부 데이터 소스 접근에 실패하면 백엔드 내부 fallback JSON (\`backend/data/fallback/sales-data.json\`)을 사용

### B. 국제 정세 이벤트 데이터 (\`/api/events\`)
- 위키피디아 카테고리/문서 페이지 기반 수집 (예: Russo-Ukrainian War, US-China trade war, COVID-19 impact on automotive industry 등)
- 또는 RSS 기반 뉴스 수집 (Reuters Autos, Automotive News RSS — 가능 시)
- 실패 시 fallback JSON (\`backend/data/fallback/events-data.json\`) 사용

### C. fallback JSON에 들어갈 시드 데이터
실시간 수집이 실패해도 대시보드가 동작하도록, 아래 실제 트렌드를 반영한 시드 데이터를 \`backend/data/fallback/\`에 생성해줘:

**판매량 시드 (2020~2025년 분기별)**
- Toyota: 2025년 약 1,132만대, 미국 +7.3%, 중국 보합, 유럽 약세
- Volkswagen: 2025년 약 910만대, 아시아 -6.6%, 미주 +4.5%
- Hyundai: 2025년 약 730만대, 전체 소폭 성장, EV 라인업 확대
- GM: 2025년 약 600만대, 북미 중심, 중국 시장 축소
- Stellantis: 2025년 약 540만대, 하반기 +11% 반등

데이터 형식:
\`\`\`json
{
  "company": "Toyota",
  "year": 2025,
  "quarter": "Q1",
  "region": "americas",
  "sales": 780000,
  "yoy_change": 5.2
}
\`\`\`

**이벤트 시드 (2020~2025)**
- 2020: COVID-19 팬데믹(높음), 유가 폭락(중간)
- 2021: 글로벌 반도체 부족(높음), 수에즈 운하 봉쇄(중간)
- 2022: 러-우 전쟁(높음), 중국 제로코로나(높음), 미국 IRA법(중간)
- 2023: 유럽 EV 보조금 축소(중간), 중국 EV 가격전쟁(중간), UAW 파업(중간)
- 2024: 중국산 EV 관세(높음), 홍해 후티 공격(중간), 일본 엔저(중간)
- 2025: 트럼프 자동차 관세 25%(높음), 미-일/미-EU 무역합의 15%(중간), 중국 희토류 수출통제(높음), 미-중 관세 145% 일시유예(높음), 미 대법원 IEEPA 위헌 판결(높음)

## 4) API 엔드포인트
- \`GET /api/sales\` — 판매량 데이터 반환 (쿼리: \`?year=&region=&company=\`)
- \`GET /api/events\` — 이벤트 데이터 반환 (쿼리: \`?from=&to=&category=&severity=\`)
- \`GET /api/meta\` — 마지막 수집 시각, 데이터 출처, 상태(\`live\` / \`fallback\`) 반환
- \`POST /api/refresh\` — (개발용) 수동으로 수집 즉시 트리거

응답 공통 포맷:
\`\`\`json
{
  "data": [...],
  "meta": {
    "lastUpdated": "2026-04-18T12:00:00Z",
    "source": "live | fallback",
    "count": 120
  }
}
\`\`\`

## 5) 에러 처리 & 안정성
- 수집 실패 시 자동으로 fallback JSON 사용, \`meta.source = "fallback"\`으로 표시
- 재시도 로직: 실패 시 최대 3회, 지수 백오프 (1s → 2s → 4s)
- 모든 수집 결과는 로그로 기록 (성공/실패, 소요 시간, 수집 건수)
- 수집 중에도 API 응답은 항상 가능 (직전 캐시 데이터 제공)

# Tech Stack

## Frontend (frontend/)
- React + TypeScript + Vite
- Chart library: Recharts
- Styling: Tailwind CSS
- Icons: Lucide React
- API communication: Axios
- Data caching/refetching: TanStack Query (React Query)

## Backend (backend/)
- Node.js + Express + TypeScript
- Scheduler: \`node-cron\` (data collection every 1 hour)
- HTTP client: Axios
- HTML parsing: Cheerio (for scraping Wikipedia/news pages)
- Data storage: Local JSON files (\`backend/data/\` folder, abstracted for future DB replacement)
- Logging: Winston or Pino
- CORS enabled (allow frontend domain)
- Environment variables: dotenv (manage API keys etc. in \`.env\` file)

# Backend Design

## 1) Data Collection Scheduler
Use \`node-cron\` to automatically collect data every hour.

\`\`\`
0 * * * *  → runs at the top of every hour
\`\`\`

Run once immediately on server start, then repeat every hour.

## 2) Data Sources

### A. Sales Data (\`/api/sales\`)
Collect quarterly/annual sales for 5 automotive groups from:

## 4) API Endpoints
- \`GET /api/sales\` — returns sales data (query: \`?year=&region=&company=\`)
- \`GET /api/events\` — returns events data (query: \`?from=&to=&category=&severity=\`)
- \`GET /api/meta\` — returns last collection time, data source, status (\`live\` / \`fallback\`)
- \`POST /api/refresh\` — (dev) manually trigger immediate collection

Common response format:
\`\`\`json
{
  "data": [...],
  "meta": {
    "lastUpdated": "2026-04-18T12:00:00Z",
    "source": "live | fallback",
    "count": 120
  }
}
\`\`\`

## 5) Error Handling & Stability
- On collection failure, automatically use fallback JSON, set \`meta.source = "fallback"\`
- Retry logic: up to 3 retries with exponential backoff (1s → 2s → 4s)
- Log all collection results (success/failure, elapsed time, count)
- API always responds even during collection (serve previous cached data)

const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function copyToClipboard(text, btnEl) {
  const lang = btnEl.dataset.lang;

  const LABELS = {
    kr: {
      default: '복사',
      copied: '복사됨'
    },
    en: {
      default: 'Copy',
      copied: 'Copied'
    }
  };

  navigator.clipboard.writeText(text).then(() => {
    btnEl.classList.add('copied');
    btnEl.innerHTML = checkIcon + LABELS[lang].copied;

    setTimeout(() => {
      btnEl.classList.remove('copied');
      btnEl.innerHTML = copyIcon + LABELS[lang].default;
    }, 2000);
  });
}
